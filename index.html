<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Hand Pilot — 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">Score</span>
      <span id="score" class="hud-value">0</span>
    </div>
    <div class="hud-block hud-center">
      <span class="hud-label">Vies</span>
      <span id="lives" class="hud-value lives">♥ ♥ ♥</span>
    </div>
    <div id="camera-status" class="status-badge status-waiting">
      Initialisation de la caméra…
    </div>
  </div>

  <!-- Bandeau d'aide -->
  <div id="help-bar">
    <span>Main gauche ✋ direction</span>
    <span class="sep">·</span>
    <span>Main droite 🔫 pistolet</span>
    <span class="sep">·</span>
    <span>Flèches + Espace</span>
  </div>

  <!-- Game Over -->
  <div id="game-over" class="hidden">
    <p class="over-tag">Mission terminée</p>
    <h1>Game Over</h1>
    <p id="over-message" class="over-message">Le vaisseau a été détruit.</p>
    <div class="score-box">
      <span class="hud-label">Score final</span>
      <span id="final-score" class="final-score">0</span>
    </div>
    <button id="restart-btn">Rejouer</button>
    <p class="hint">Main gauche : pilotez · Main droite : tirez en replissant le pouce</p>
  </div>

  <!-- Retour caméra -->
  <div id="camera-preview">
    <span class="preview-label">Caméra</span>
    <video id="webcam" autoplay playsinline muted></video>
  </div>

  <!-- Three.js + MediaPipe -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script src="js/handTracker.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
